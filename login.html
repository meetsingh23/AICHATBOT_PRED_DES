<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NextGen AI | Login & Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
background:#1a1333;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',Arial,sans-serif;
overflow:hidden;
perspective:1200px;
}

.bg-pulse{
position:fixed;
width:300vw;
height:300vw;
left:50%;
top:40%;
pointer-events:none;
z-index:1;
transform:translate(-50%,-50%);
background:radial-gradient(circle,#7b4dff 0%,#120a2a 80%);
animation:pulse 6s ease-in-out infinite;
opacity:0.23;
border-radius:50%;
}

@keyframes pulse{
0%,100%{transform:translate(-50%,-50%) scale(0.96);}
50%{transform:translate(-50%,-50%) scale(1.04);}
}

.glass-card{
position:relative;
z-index:2;
min-width:370px;
max-width:90vw;
border-radius:28px;
padding:44px 32px 38px 32px;
background:rgba(255,255,255,0.08);
box-shadow:0 8px 32px rgba(24,45,130,0.38);
backdrop-filter:blur(10px);
text-align:center;
transition:transform 0.8s ease,opacity 0.8s ease;
}

.ai-avatar{
margin:0 auto 20px auto;
width:85px;
height:85px;
border-radius:50%;
background:linear-gradient(135deg,#7b4dff 50%,#3a0ca3 100%);
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 20px #7b4dff88;
animation:avatar_jump 4s infinite cubic-bezier(.62,1.7,.38,.97);
}

@keyframes avatar_jump{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.ai-avatar svg{
width:62px;
height:62px;
fill:#fff;
}

h1{
font-size:2.2rem;
color:#7b4dff;
margin-bottom:6px;
}

.ai-caption{
color:#f3f7f9;
font-style:italic;
margin-bottom:20px;
}

input{
width:85%;
margin:8px 0;
padding:12px 16px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:#fff;
font-size:1rem;
outline:none;
transition:all 0.3s ease;
}

input:focus{
background:rgba(255,255,255,0.25);
transform:translateY(-2px);
box-shadow:0 4px 12px rgba(123,77,255,0.4);
}

.btn-glow{
min-width:120px;
padding:13px 20px;
border:none;
background:linear-gradient(90deg,#7b4dff 10%,#3a0ca3 80%);
color:#fff;
font-size:1.1rem;
border-radius:13px;
font-weight:600;
box-shadow:0 4px 22px #7b4dff88;
cursor:pointer;
margin-top:14px;
}

.toggle{
margin-top:18px;
font-size:0.95rem;
color:#dbe3f3;
cursor:pointer;
display:inline-block;
}

.toggle:hover{
color:#7b4dff;
}

.screen{
position:absolute;
opacity:0;
transform:scale(0.95);
pointer-events:none;
transition:opacity 0.8s ease,transform 0.8s ease;
}

.screen.active{
opacity:1;
transform:scale(1);
pointer-events:all;
}
</style>
</head>

<body>

<div class="bg-pulse"></div>

<!-- WELCOME -->
<div class="glass-card screen active" id="welcome">

<div class="ai-avatar">
<svg viewBox="0 0 62 62">
<circle cx="31" cy="20" r="10"/>
<path d="M10 55c2-12 40-12 42 0" stroke="#fff" stroke-width="3" fill="none"/>
</svg>
</div>

<h1>Welcome</h1>

<button class="btn-glow" onclick="showScreen('login')">Login 👤</button>
<button class="btn-glow" onclick="showScreen('signup')">Sign Up ✉</button>

</div>

<!-- LOGIN -->

<div class="glass-card screen" id="login">

<h1>Login</h1>

<form id="loginForm">
<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>
<button type="submit" class="btn-glow">Login</button>
</form>

<div class="toggle" onclick="showScreen('signup')">Don't have an account? Sign Up</div>
<div class="toggle" onclick="showScreen('welcome')">← Back</div>

</div>

<!-- SIGNUP -->

<div class="glass-card screen" id="signup">

<h1>Sign Up</h1>

<form id="signupForm">
<input type="text" id="fullName" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="userId" placeholder="User ID" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit" class="btn-glow">Create Account</button>
</form>

<div class="toggle" onclick="showScreen('login')">Already have account? Login</div>
<div class="toggle" onclick="showScreen('welcome')">← Back</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"",
authDomain:"nextgenai-login.firebaseapp.com",
projectId:"nextgenai-login",
storageBucket:"nextgenai-login.appspot.com",
messagingSenderId:"191145520407",
appId:"1:191145520407:web:5b179ad75b10ddc0a91b52"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showScreen=function(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

const loginForm=document.getElementById("loginForm");

loginForm.addEventListener("submit",async(e)=>{

e.preventDefault();

const email=document.getElementById("loginEmail").value.trim();
const password=document.getElementById("loginPassword").value.trim();

const querySnapshot=await getDocs(collection(db,"users"));

let found=false;
let userName="";

querySnapshot.forEach((doc)=>{

const data=doc.data();

if(data.email===email && data.password===password){

found=true;
userName=data.name;

}

});

if(found){

localStorage.setItem("userName",userName);
alert("Login Successful");
window.location.href="intro.html";

}
else{

alert("Invalid email or password");

}

});

const signupForm=document.getElementById("signupForm");

signupForm.addEventListener("submit",async(e)=>{

e.preventDefault();

const fullName=document.getElementById("fullName").value.trim();
const email=document.getElementById("email").value.trim();
const userId=document.getElementById("userId").value.trim();
const password=document.getElementById("password").value.trim();

await addDoc(collection(db,"users"),{

name:fullName,
email:email,
userId:userId,
password:password

});

alert("Signup Successful");

localStorage.setItem("userName",fullName);

window.location.href="intro.html";

});

</script>

</body>
</html>
